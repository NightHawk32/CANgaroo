name: Build CANgaroo

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-ubuntu:
    name: Build CANgaroo (Ubuntu / Qt6)
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git cmake \
          qt6-base-dev qt6-base-private-dev qt6-tools-dev \
          libqt6serialport6-dev libqt6charts6-dev \
          adwaita-qt6 libadwaitaqt6-1 pybind11-dev \
          libnl-3-dev libnl-route-3-dev libgl1-mesa-dev fuse libfuse2 wget

    - name: Verify Qt6 and Adwaita installation
      run: |
        echo "=== Qt6 Version ==="
        qmake6 --version

        echo "=== Qt6 Plugin Path ==="
        QT6_PLUGIN_PATH=$(qmake6 -query QT_INSTALL_PLUGINS)
        echo "Qt6 Plugins: $QT6_PLUGIN_PATH"

        echo "=== Available Styles ==="
        ls -la $QT6_PLUGIN_PATH/styles/ || echo "No styles directory"

        echo "=== Platform Themes ==="
        ls -la $QT6_PLUGIN_PATH/platformthemes/ || echo "No platformthemes directory"

        echo "=== Adwaita Libraries ==="
        ls -la /usr/lib/x86_64-linux-gnu/libadwaitaqt6*.so* || echo "No Adwaita libraries found"

    - name: Run qmake6 and make
      run: |
        qmake6
        make -j$(nproc)

    - name: Prepare AppDir
      run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/plugins/styles
          mkdir -p AppDir/usr/plugins/platformthemes

          sed -i 's|Exec=/usr/bin/cangaroo %f|Exec=cangaroo %f|' cangaroo.desktop

          cp bin/cangaroo AppDir/usr/bin/
          cp cangaroo.desktop AppDir/usr/share/applications/
          cp src/assets/cangaroo.png AppDir/usr/share/icons/hicolor/256x256/apps/

    - name: Copy Adwaita plugins to AppDir
      run: |
          QT6_PLUGIN_PATH=$(qmake6 -query QT_INSTALL_PLUGINS)

          echo "=== Copying Adwaita style plugin ==="
          ls $QT6_PLUGIN_PATH/styles/
          if [ -f "$QT6_PLUGIN_PATH/styles/adwaita.so" ]; then
            cp -v "$QT6_PLUGIN_PATH/styles/adwaita.so" AppDir/usr/plugins/styles/
            echo "Adwaita style copied"
          else
            echo "Warning: Adwaita style not found"
          fi

          echo "=== Copying QGnomePlatform plugin ==="
          if [ -f "$QT6_PLUGIN_PATH/platformthemes/libqgnomeplatform.so" ]; then
            cp -v "$QT6_PLUGIN_PATH/platformthemes/libqgnomeplatform.so" AppDir/usr/plugins/platformthemes/
            echo "QGnomePlatform copied"
          else
            echo "Warning: QGnomePlatform not found"
          fi

          echo "=== Copying Adwaita libraries ==="
          mkdir -p AppDir/usr/lib
          for lib in /usr/lib/x86_64-linux-gnu/libadwaitaqt6*.so*; do
            if [ -f "$lib" ]; then
              cp -Pv "$lib" AppDir/usr/lib/
              echo "Copied: $lib"
            fi
          done

    - name: Create qt.conf
      run: |
          cat > AppDir/usr/bin/qt.conf << 'EOF'
          [Paths]
          Plugins = ../plugins
          Libraries = ../lib
          Prefix = ../
          EOF

          echo "=== qt.conf created ==="
          cat AppDir/usr/bin/qt.conf

    - name: Download linuxdeploy
      run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

    - name: Build AppImage
      env:
        QMAKE: qmake6
        QML_SOURCES_PATHS: ./src
      run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

    - name: Upload AppImage
      uses: actions/upload-artifact@v6
      with:
          name: CANgaroo-Linux-AppImage
          path: "CAN*.AppImage"

    - name: Build DEB package
      run: |
          PKG_NAME=cangaroo
          PKG_VERSION=$(grep '^VERSION' src/src.pro | sed 's/VERSION\s*=\s*//')
          PKG_ARCH=amd64

          DEB_DIR="${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}"
          mkdir -p "${DEB_DIR}/DEBIAN"
          mkdir -p "${DEB_DIR}/usr/bin"
          mkdir -p "${DEB_DIR}/usr/share/applications"
          mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps"

          cp bin/cangaroo "${DEB_DIR}/usr/bin/"
          chmod 755 "${DEB_DIR}/usr/bin/cangaroo"

          cp cangaroo.desktop "${DEB_DIR}/usr/share/applications/"
          cp src/assets/cangaroo.png "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/"

          cat > "${DEB_DIR}/DEBIAN/control" << EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}
          Section: utils
          Priority: optional
          Architecture: ${PKG_ARCH}
          Depends: libqt6core6t64, libqt6gui6t64, libqt6widgets6t64, libqt6serialport6, libqt6charts6, libnl-3-200, libnl-route-3-200
          Maintainer: Schildkroet <https://github.com/Schildkroet>
          Description: CAN bus analyzer and visualization tool
           CANgaroo is an open-source CAN bus analyzer with support for
           SocketCAN interfaces, DBC file parsing, trace recording,
           and Python scripting.
          EOF

          # Remove leading whitespace from control file (heredoc indentation)
          sed -i 's/^          //' "${DEB_DIR}/DEBIAN/control"

          dpkg-deb --build --root-owner-group "${DEB_DIR}"

    - name: Upload DEB package
      uses: actions/upload-artifact@v6
      with:
          name: CANgaroo-Linux-DEB
          path: "*.deb"

  build-windows:
    name: Build CANgaroo (Windows / MinGW / Qt6)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSYS2 (without install)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Cache MinGW and MSYS2 packages
        uses: actions/cache@v5
        with:
          path: |
            C:/msys64/mingw64
            C:/msys64/var/cache/pacman/pkg
          key: >
            msys2-mingw64-qt6-${{ runner.os }}-${{ hashFiles('.github/workflows/cmake.yml') }}
          restore-keys: |
            msys2-mingw64-qt6-${{ runner.os }}-

      - name: Install MinGW + Qt6 (cached)
        run: |
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-qt6 \
            mingw-w64-x86_64-qt6-tools \
            mingw-w64-x86_64-make \
            mingw-w64-x86_64-ntldd \
            mingw-w64-x86_64-python \
            mingw-w64-x86_64-pybind11 \
            git

      - name: Download PCAN-Basic SDK
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://www.peak-system.com/fileadmin/media/files/PCAN-Basic.zip" `
            -OutFile "$env:TEMP\PCAN-Basic.zip"
          Expand-Archive -Path "$env:TEMP\PCAN-Basic.zip" `
            -DestinationPath "src/driver/PeakCanDriver/pcan-basic-api" `
            -Force
          Write-Host "=== PCAN-Basic SDK contents ==="
          Get-ChildItem -Path "src/driver/PeakCanDriver/pcan-basic-api" -Recurse |
            Select-Object -ExpandProperty FullName

      - name: Verify Qt6 installation
        run: |
          qmake6 --version
          which qmake6

      - name: Configure build (Qt6 qmake)
        run: |
          qmake6 CONFIG+=release CONFIG+=peakcan

      - name: Build
        run: |
          mingw32-make -j$(nproc)

      - name: List build output
        run: |
          echo "==== Project root ===="
          ls -lah

          echo "==== Executables ===="
          find . -maxdepth 2 -name "*.exe" -type f -print

      - name: Prepare distribution directory
        run: |
          mkdir -p dist
          cp ./bin/*.exe dist/

      - name: Deploy Qt6 runtime (windeployqt)
        run: |
          EXE=$(ls dist/*.exe | head -n 1)
          windeployqt6 \
            --release \
            --no-system-d3d-compiler \
            "$EXE"

      - name: Add MinGW runtime DLLs
        run: |
          cp /mingw64/bin/libgcc_s_seh-1.dll dist/
          cp /mingw64/bin/libstdc++-6.dll dist/
          cp /mingw64/bin/libwinpthread-1.dll dist/
          cp /mingw64/bin/libmd4c.dll dist/
          cp /mingw64/bin/libharfbuzz-0.dll dist/
          cp /mingw64/bin/libfreetype-6.dll dist/
          cp /mingw64/bin/libpng16-16.dll dist/
          cp /mingw64/bin/zlib1.dll dist/
          cp /mingw64/bin/libdouble-conversion.dll dist/
          cp /mingw64/bin/libb2-1.dll dist/
          cp /mingw64/bin/libicuin78.dll dist/
          cp /mingw64/bin/libbrotlidec.dll dist/
          cp /mingw64/bin/libzstd.dll dist/
          cp /mingw64/bin/libicuuc78.dll dist/
          cp /mingw64/bin/libpcre2-16-0.dll dist/

      - name: Add Python runtime
        run: |
          PYVER=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('VERSION'))")
          cp /mingw64/bin/libpython${PYVER}.dll dist/
          # Bundle the Python standard library so scripts can import stdlib modules
          mkdir -p dist/python${PYVER}
          cp -r /mingw64/lib/python${PYVER}/* dist/python${PYVER}/ 2>/dev/null || true
          # Remove test and __pycache__ dirs to save space
          find dist/python${PYVER} -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find dist/python${PYVER} -type d -name test -exec rm -rf {} + 2>/dev/null || true

      - name: Deploy MinGW runtime dependencies
        run: |
          EXE=$(ls dist/*.exe | head -n 1)

          echo "Resolving MinGW runtime dependencies for $EXE"

          ntldd -R "$EXE" \
            | grep mingw64 \
            | awk '{print $3}' \
            | sort -u \
            | while IFS= read -r file; do
              # Convert Windows path to Linux path
              linux_path=$(echo "$file" | sed -E 's|([A-Za-z]):\\|/\L\1/|; s|\\|/|g')

              echo "Copying $linux_path"
              cp "$linux_path" dist/ || echo "Skipped $linux_path"
              done

      - name: Bundle runtime DLLs
        run: |
          cp /c/kvaser-sdk/Bin/canlib32.dll dist/
          cp src/driver/PeakCanDriver/pcan-basic-api/Bin/x64/PCANBasic.dll dist/

      - name: Verify missing DLLs
        run: |
          EXE=$(ls dist/*.exe | head -n 1)
          ntldd "$EXE" || true

      - name: Upload Windows Qt6 binaries
        uses: actions/upload-artifact@v6
        with:
          name: CANgaroo-Windows-MinGW-Qt6
          path: dist/*
